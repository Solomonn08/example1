<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | CrisisHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: #1f2937; padding: 40px; border-radius: 20px; border: 1px solid #374151; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #374151; background: #111827; color: white; box-sizing: border-box; }
        button { width: 100%; background: #6366f1; border: none; padding: 12px; color: white; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        a { color: #9ca3af; text-decoration: none; font-size: 14px; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>CrisisHub.</h1>
        <p style="color: #9ca3af;">Login to your dashboard</p>
        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <a href="/register">Don't have an account? Sign up</a>
    </div>
</body>
</html>
